
services:
  postgres:
    image: postgres:15-alpine
    container_name: webauthn_postgres
    environment:
      POSTGRES_USER: webauthn
      POSTGRES_PASSWORD: webauthn_password
      POSTGRES_DB: webauthn
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
